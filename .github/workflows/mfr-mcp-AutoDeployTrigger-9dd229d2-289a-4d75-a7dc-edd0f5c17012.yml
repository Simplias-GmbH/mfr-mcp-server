name: Trigger auto deployment for mfr-mcp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches:
      [ main ]
    paths:
    - '**'
    - '.github/workflows/mfr-mcp-AutoDeployTrigger-9dd229d2-289a-4d75-a7dc-edd0f5c17012.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.MFRMCP_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: mfrmcp.azurecr.io
          registryUsername: ${{ secrets.MFRMCP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MFRMCP_REGISTRY_PASSWORD }}
          containerAppName: mfr-mcp
          resourceGroup: Api-Default-North-Europe
          imageToBuild: mfrmcp.azurecr.io/mfr-mcp:${{ github.sha }}
          
            

     

